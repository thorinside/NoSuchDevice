<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
   width="50.8mm"
   height="128.5mm"
   viewBox="0 0 50.8 128.5"
   version="1.1"
   xmlns="http://www.w3.org/2000/svg">
  <defs id="defs1"/>

  <!-- Panel background -->
  <rect width="50.8" height="128.5" fill="#1a1a2e" id="bg"/>

  <!-- Geometric pattern: shockwave arcs from bottom-left and top-right -->
  <g opacity="0.12">
    <!-- Bottom-left shockwave -->
    <circle cx="0" cy="128.5" r="22" fill="none" stroke="#ffffff" stroke-width="0.4"/>
    <circle cx="0" cy="128.5" r="38" fill="none" stroke="#ffffff" stroke-width="0.32"/>
    <circle cx="0" cy="128.5" r="56" fill="none" stroke="#ffffff" stroke-width="0.26"/>
    <circle cx="0" cy="128.5" r="76" fill="none" stroke="#ffffff" stroke-width="0.2"/>
    <circle cx="0" cy="128.5" r="98" fill="none" stroke="#ffffff" stroke-width="0.15"/>
    <circle cx="0" cy="128.5" r="122" fill="none" stroke="#ffffff" stroke-width="0.11"/>
    <line x1="0" y1="128.5" x2="50.8" y2="0" stroke="#ffffff" stroke-width="0.2"/>
    <line x1="0" y1="128.5" x2="50.8" y2="45" stroke="#ffffff" stroke-width="0.14"/>
    <line x1="0" y1="128.5" x2="38" y2="0" stroke="#ffffff" stroke-width="0.14"/>
    <line x1="0" y1="128.5" x2="50.8" y2="90" stroke="#ffffff" stroke-width="0.1"/>
    <line x1="0" y1="128.5" x2="22" y2="0" stroke="#ffffff" stroke-width="0.1"/>
    <polygon points="18,102 28,89 8,89" fill="none" stroke="#ffffff" stroke-width="0.24"/>
    <polygon points="34,72 46,58 22,58" fill="none" stroke="#ffffff" stroke-width="0.2"/>
    <polygon points="42,44 50,34 34,34" fill="none" stroke="#ffffff" stroke-width="0.16"/>
    <!-- Top-right interference -->
    <circle cx="50.8" cy="0" r="36" fill="none" stroke="#ffffff" stroke-width="0.14"/>
    <circle cx="50.8" cy="0" r="60" fill="none" stroke="#ffffff" stroke-width="0.11"/>
    <circle cx="50.8" cy="0" r="88" fill="none" stroke="#ffffff" stroke-width="0.09"/>
    <circle cx="50.8" cy="0" r="120" fill="none" stroke="#ffffff" stroke-width="0.07"/>
  </g>

  <!-- Border -->
  <rect x="0.3" y="0.3" width="50.2" height="127.9" rx="0.5"
        fill="none" stroke="#303060" stroke-width="0.3" id="border"/>

  <!-- Title: DIV TRIG -->
  <text x="25.4" y="7.5"
        style="font-weight:bold;font-size:5.5px;font-family:'DIN Condensed',sans-serif;letter-spacing:1.0;text-anchor:middle;fill:#e8eaf0"
        id="title">DIV TRIG</text>

  <!-- Component guide marks and labels -->

  <!-- TRIG_INPUT -->
  <circle cx="5.08" cy="24.672" r="3.5" fill="none" stroke="#555555" stroke-width="0.3" opacity="0.4"/>
  <text x="5.08" y="28.5"
        style="font-size:2.2px;font-family:'DIN Condensed',sans-serif;text-anchor:middle;fill:#8088a0"
        id="label-trig">TRIG</text>

  <!-- PROB_PARAM knob ring -->
  <circle cx="5.08" cy="35.984" r="5.0" fill="none" stroke="#555555" stroke-width="0.3" opacity="0.4"/>
  <text x="5.08" y="39.5"
        style="font-size:2.2px;font-family:'DIN Condensed',sans-serif;text-anchor:middle;fill:#8088a0"
        id="label-prob">PROB</text>

  <!-- Divider -->
  <line x1="2.5" y1="42.5" x2="48.3" y2="42.5" stroke="#2a2a3a" stroke-width="0.4"/>

  <!-- Output rings and labels -->
  <circle cx="5.191" cy="47.497" r="3.5" fill="none" stroke="#555555" stroke-width="0.3" opacity="0.4"/>
  <text x="5.191" y="51.4"
        style="font-size:2.2px;font-family:'DIN Condensed',sans-serif;text-anchor:middle;fill:#8088a0">1x</text>

  <circle cx="5.191" cy="55.093" r="3.5" fill="none" stroke="#555555" stroke-width="0.3" opacity="0.4"/>
  <text x="5.191" y="59.0"
        style="font-size:2.2px;font-family:'DIN Condensed',sans-serif;text-anchor:middle;fill:#8088a0">2x</text>

  <circle cx="5.191" cy="62.689" r="3.5" fill="none" stroke="#555555" stroke-width="0.3" opacity="0.4"/>
  <text x="5.191" y="66.6"
        style="font-size:2.2px;font-family:'DIN Condensed',sans-serif;text-anchor:middle;fill:#8088a0">3x</text>

  <circle cx="5.191" cy="70.284" r="3.5" fill="none" stroke="#555555" stroke-width="0.3" opacity="0.4"/>
  <text x="5.191" y="74.2"
        style="font-size:2.2px;font-family:'DIN Condensed',sans-serif;text-anchor:middle;fill:#8088a0">4x</text>

  <circle cx="5.191" cy="77.880" r="3.5" fill="none" stroke="#555555" stroke-width="0.3" opacity="0.4"/>
  <text x="5.191" y="81.8"
        style="font-size:2.2px;font-family:'DIN Condensed',sans-serif;text-anchor:middle;fill:#8088a0">5x</text>

  <circle cx="5.191" cy="85.476" r="3.5" fill="none" stroke="#555555" stroke-width="0.3" opacity="0.4"/>
  <text x="5.191" y="89.4"
        style="font-size:2.2px;font-family:'DIN Condensed',sans-serif;text-anchor:middle;fill:#8088a0">6x</text>

  <circle cx="5.191" cy="93.071" r="3.5" fill="none" stroke="#555555" stroke-width="0.3" opacity="0.4"/>
  <text x="5.191" y="97.0"
        style="font-size:2.2px;font-family:'DIN Condensed',sans-serif;text-anchor:middle;fill:#8088a0">7x</text>

  <circle cx="5.191" cy="100.667" r="3.5" fill="none" stroke="#555555" stroke-width="0.3" opacity="0.4"/>
  <text x="5.191" y="104.6"
        style="font-size:2.2px;font-family:'DIN Condensed',sans-serif;text-anchor:middle;fill:#8088a0">8x</text>

  <!-- Divider above reset -->
  <line x1="2.5" y1="107.0" x2="48.3" y2="107.0" stroke="#2a2a3a" stroke-width="0.4"/>

  <!-- RESET_INPUT -->
  <circle cx="5.191" cy="110.117" r="3.5" fill="none" stroke="#555555" stroke-width="0.3" opacity="0.4"/>
  <text x="5.191" y="114.0"
        style="font-size:2.2px;font-family:'DIN Condensed',sans-serif;text-anchor:middle;fill:#8088a0">RESET</text>

  <!-- Brand / bottom -->
  <text x="25.4" y="122.5"
        style="font-size:2.8px;font-family:'DIN Condensed',sans-serif;letter-spacing:0.4;text-anchor:middle;fill:#c0c8e8"
        id="brand">No Such Device</text>
</svg>
