<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
   width="20.32mm"
   height="128.5mm"
   viewBox="0 0 20.32 128.5"
   version="1.1"
   xmlns="http://www.w3.org/2000/svg">
  <defs id="defs1"/>

  <!-- Panel background -->
  <rect width="20.32" height="128.5" fill="#1a1a2e" id="bg"/>

  <!-- Geometric pattern: shockwave from bottom-left, simplified for 4HP -->
  <g opacity="0.12">
    <circle cx="0" cy="128.5" r="18" fill="none" stroke="#ffffff" stroke-width="0.35"/>
    <circle cx="0" cy="128.5" r="32" fill="none" stroke="#ffffff" stroke-width="0.28"/>
    <circle cx="0" cy="128.5" r="48" fill="none" stroke="#ffffff" stroke-width="0.22"/>
    <circle cx="0" cy="128.5" r="66" fill="none" stroke="#ffffff" stroke-width="0.18"/>
    <circle cx="0" cy="128.5" r="86" fill="none" stroke="#ffffff" stroke-width="0.14"/>
    <circle cx="0" cy="128.5" r="108" fill="none" stroke="#ffffff" stroke-width="0.1"/>
    <line x1="0" y1="128.5" x2="20.32" y2="0" stroke="#ffffff" stroke-width="0.18"/>
    <line x1="0" y1="128.5" x2="20.32" y2="50" stroke="#ffffff" stroke-width="0.12"/>
    <line x1="0" y1="128.5" x2="15" y2="0" stroke="#ffffff" stroke-width="0.12"/>
    <polygon points="6,100 10,92 2,92" fill="none" stroke="#ffffff" stroke-width="0.2"/>
    <polygon points="14,75 18,67 10,67" fill="none" stroke="#ffffff" stroke-width="0.16"/>
    <!-- Interference from top-right -->
    <circle cx="20.32" cy="0" r="30" fill="none" stroke="#ffffff" stroke-width="0.12"/>
    <circle cx="20.32" cy="0" r="52" fill="none" stroke="#ffffff" stroke-width="0.09"/>
    <circle cx="20.32" cy="0" r="78" fill="none" stroke="#ffffff" stroke-width="0.07"/>
  </g>

  <!-- Border -->
  <rect x="0.3" y="0.3" width="19.72" height="127.9" rx="0.5"
        fill="none" stroke="#303060" stroke-width="0.3" id="border"/>

  <!-- Title: TRIG GATE -->
  <text x="10.16" y="7.5"
        style="font-weight:bold;font-size:4.5px;font-family:'DIN Condensed',sans-serif;letter-spacing:0.8;text-anchor:middle;fill:#e8eaf0"
        id="title">TRIG GATE</text>

  <!-- Component guide marks -->
  <!-- START_INPUT port ring -->
  <circle cx="5.08" cy="24.672" r="3.5" fill="none" stroke="#555555" stroke-width="0.3" opacity="0.4"/>
  <text x="5.08" y="28.5"
        style="font-size:2.2px;font-family:'DIN Condensed',sans-serif;text-anchor:middle;fill:#8088a0"
        id="label-start">START</text>

  <!-- STOP_INPUT port ring -->
  <circle cx="5.08" cy="37.353" r="3.5" fill="none" stroke="#555555" stroke-width="0.3" opacity="0.4"/>
  <text x="5.08" y="41.2"
        style="font-size:2.2px;font-family:'DIN Condensed',sans-serif;text-anchor:middle;fill:#8088a0"
        id="label-stop">STOP</text>

  <!-- Divider line -->
  <line x1="2.5" y1="43.5" x2="17.82" y2="43.5" stroke="#2a2a3a" stroke-width="0.4"/>

  <!-- GATE_OUTPUT port ring -->
  <circle cx="5.08" cy="109.232" r="3.5" fill="none" stroke="#555555" stroke-width="0.3" opacity="0.4"/>
  <text x="5.08" y="113.2"
        style="font-size:2.2px;font-family:'DIN Condensed',sans-serif;text-anchor:middle;fill:#8088a0"
        id="label-gate">GATE</text>

  <!-- Brand / bottom -->
  <text x="10.16" y="122.5"
        style="font-size:2.5px;font-family:'DIN Condensed',sans-serif;letter-spacing:0.3;text-anchor:middle;fill:#c0c8e8"
        id="brand">No Such Device</text>
</svg>
